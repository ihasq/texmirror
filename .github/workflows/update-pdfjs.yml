name: Update PDF.js viewer

on:
  schedule:
    - cron: '17 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update vendored PDF.js viewer
        run: npm run update:pdfjs

      - name: Build
        run: npm run build

      - name: Read PDF.js version
        run: |
          version="$(node -e "const fs=require('fs'); const text=fs.readFileSync('public/pdfjs/README.md','utf8'); const match=text.match(/PDF\\.js\\s+([^,\\s]+)/); if (!match) process.exit(1); console.log(match[1]);")"
          echo "PDFJS_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Commit and push update
        run: |
          if git diff --quiet -- public/pdfjs; then
            echo "PDF.js viewer is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/pdfjs
          git commit -m "Update PDF.js viewer to ${PDFJS_VERSION}"
          git push
